<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f7f2e9">
<meta name="description" content="Workout Tracker mobile-first para acompanhar treinos, progresso, streak e descanso no iPhone.">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.webmanifest">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #f4efe6;
  --card: #fffaf2;
  --card-done: #e3efe4;
  --text: #1f2933;
  --text-muted: #6b7280;
  --accent-push: #c96c3a;
  --accent-pull: #52796f;
  --accent-legs: #7c8f4e;
  --accent-rest: #8a6f8f;
  --peito: #b85c38;
  --triceps: #d17a45;
  --costas: #4f6d7a;
  --biceps: #5b8e7d;
  --pernas: #758e4f;
  --ombros: #b68c4a;
  --abdomen: #8c6f9c;
  --trapezio: #a56a6a;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --shadow: 0 16px 40px rgba(96, 77, 55, 0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background:
    radial-gradient(circle at top, rgba(201, 108, 58, 0.16), transparent 32%),
    radial-gradient(circle at 85% 18%, rgba(82, 121, 111, 0.14), transparent 24%),
    linear-gradient(180deg, #f7f2e9 0%, #efe6d9 100%);
  color: var(--text);
  min-height: 100dvh;
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 100px) 16px;
  overflow-x: hidden;
}

button {
  font: inherit;
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.header .date {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  padding: 4px 12px;
  background: rgba(201, 108, 58, 0.12);
  border: 1px solid rgba(201, 108, 58, 0.24);
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--accent-push);
}

.progress-container {
  background: rgba(31, 41, 51, 0.08);
  border-radius: 12px;
  height: 8px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  border-radius: 12px;
  transition: width 0.4s ease, background 0.4s ease;
  width: 0%;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}

.summary-card {
  background: rgba(255, 250, 242, 0.92);
  border: 1px solid rgba(114, 92, 70, 0.1);
  border-radius: 16px;
  padding: 14px;
  box-shadow: var(--shadow);
}

.summary-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.summary-value {
  font-size: 1.05rem;
  font-weight: 700;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 4px;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  background: rgba(255, 250, 242, 0.84);
  border: 1px solid rgba(114, 92, 70, 0.12);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.3s ease;
  min-height: 52px;
  -webkit-appearance: none;
  appearance: none;
}

.tab.active {
  background: var(--accent-push);
  border-color: var(--accent-push);
  color: #fff;
}

.tab[data-type="pull"].active { background: var(--accent-pull); border-color: var(--accent-pull); }
.tab[data-type="legs"].active { background: var(--accent-legs); border-color: var(--accent-legs); }
.tab[data-type="rest"].active { background: var(--accent-rest); border-color: var(--accent-rest); }

.exercise-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: stretch;
  transition: all 0.3s ease;
  border: 1px solid rgba(114, 92, 70, 0.1);
  position: relative;
  overflow: hidden;
  width: 100%;
  text-align: left;
  box-shadow: var(--shadow);
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

.exercise-card.done {
  background: var(--card-done);
  opacity: 0.7;
}

.exercise-card.done .exercise-name {
  text-decoration: line-through;
  color: var(--text-muted);
}

.exercise-card.done .exercise-reps {
  color: rgba(31, 41, 51, 0.6);
}

.exercise-card.done .check-circle {
  background: var(--accent-push);
  border-color: var(--accent-push);
}

.exercise-card.done .check-circle svg { opacity: 1; }

.exercise-card:active {
  transform: scale(0.99);
}

.card-image {
  width: 72px;
  height: 72px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(201, 108, 58, 0.1), rgba(82, 121, 111, 0.08));
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(114, 92, 70, 0.1);
}

.card-image .fallback-icon {
  font-size: 1.4rem;
  opacity: 0.95;
}

.exercise-gif {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #fffaf2;
}

.card-image.has-gif .fallback-media {
  display: none;
}

.card-image .fallback-label {
  display: block;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  margin-top: 2px;
  opacity: 0.7;
}

.card-content {
  flex: 1;
  min-width: 0;
}

.exercise-name {
  font-size: 0.98rem;
  font-weight: 600;
  margin-bottom: 3px;
  transition: all 0.3s ease;
}

.exercise-focus {
  font-size: 0.74rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.exercise-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}

.meta-pill {
  padding: 5px 8px;
  border-radius: 999px;
  background: rgba(114, 92, 70, 0.08);
  color: rgba(31, 41, 51, 0.82);
  font-size: 0.7rem;
  font-weight: 600;
}

.exercise-reps {
  font-size: 0.76rem;
  color: rgba(31, 41, 51, 0.72);
  margin-bottom: 8px;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.exercise-desc {
  font-size: 0.75rem;
  color: var(--text-muted);
  line-height: 1.4;
}

.exercise-desc summary {
  list-style: none;
  cursor: pointer;
  color: inherit;
  font-weight: 600;
}

.exercise-desc summary::-webkit-details-marker {
  display: none;
}

.exercise-desc details {
  background: rgba(114, 92, 70, 0.06);
  border-radius: 10px;
  padding: 8px 10px;
}

.exercise-desc details[open] {
  background: rgba(114, 92, 70, 0.1);
}

.desc-preview {
  color: rgba(31, 41, 51, 0.88);
}

.desc-full {
  display: block;
  margin-top: 8px;
}

.split-overview {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin: 0 0 18px;
}

.split-day {
  background: rgba(255, 250, 242, 0.74);
  border: 1px solid rgba(114, 92, 70, 0.1);
  border-radius: 14px;
  padding: 10px 8px;
  text-align: center;
  font-size: 0.74rem;
  color: var(--text-muted);
}

.split-day strong {
  display: block;
  margin-bottom: 4px;
  color: var(--text);
  font-size: 0.82rem;
}

.check-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(114, 92, 70, 0.22);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  align-self: center;
}

.check-circle svg {
  width: 16px;
  height: 16px;
  opacity: 0;
  transition: opacity 0.3s ease;
  fill: #fff;
}

.timer-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(247, 242, 233, 0.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 16px calc(var(--safe-bottom) + 16px) 16px;
  border-top: 1px solid rgba(114, 92, 70, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 -10px 30px rgba(96, 77, 55, 0.08);
}

.timer-btn {
  padding: 10px 20px;
  border-radius: 12px;
  border: none;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  color: #fff;
  -webkit-appearance: none;
  appearance: none;
}

.timer-btn.primary { background: var(--accent-push); }
.timer-btn.secondary { background: rgba(114, 92, 70, 0.1); color: var(--text); }

.timer-display {
  font-size: 1.4rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 60px;
  text-align: center;
  color: var(--text);
}

.rest-day {
  text-align: center;
  padding: 60px 20px;
}

.rest-day .emoji { font-size: 4rem; margin-bottom: 16px; }
.rest-day h2 { font-size: 1.3rem; margin-bottom: 8px; }
.rest-day p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

.confetti { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

@keyframes fadeCheck {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.exercise-card.just-checked { animation: fadeCheck 0.3s ease; }

.tip-box {
  margin: 0 0 18px;
  padding: 14px 16px;
  background: rgba(82, 121, 111, 0.1);
  border: 1px solid rgba(82, 121, 111, 0.16);
  border-radius: 14px;
  font-size: 0.8rem;
  color: rgba(31, 41, 51, 0.9);
}

@media (max-width: 390px) {
  .summary-grid {
    grid-template-columns: 1fr;
  }

  .split-overview {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .timer-container {
    gap: 8px;
    padding-left: 12px;
    padding-right: 12px;
  }

  .timer-btn {
    padding: 10px 14px;
    font-size: 0.8rem;
  }

  .timer-display {
    min-width: 52px;
    font-size: 1.2rem;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1 id="title">Workout Tracker</h1>
  <div class="date" id="dateDisplay"></div>
  <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span> dias seguidos</div>
</div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Treino do dia</div>
    <div class="summary-value" id="workoutLabel">Descanso</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Progresso</div>
    <div class="summary-value" id="progressLabel">0 de 0</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Séries previstas</div>
    <div class="summary-value" id="setsLabel">0</div>
  </div>
</div>

<div class="tip-box" id="tipBox">Toque em um exercício para marcar como concluído. O detalhe técnico fica recolhido para facilitar a leitura no iPhone.</div>

<div class="split-overview">
  <div class="split-day"><strong>Seg</strong>Push A</div>
  <div class="split-day"><strong>Ter</strong>Pull A</div>
  <div class="split-day"><strong>Qua</strong>Legs</div>
  <div class="split-day"><strong>Qui</strong>Push B</div>
  <div class="split-day"><strong>Sex</strong>Pull B</div>
</div>

<div class="tabs" id="tabs"></div>

<div id="exerciseList"></div>

<div class="timer-container">
  <button class="timer-btn secondary" onclick="setTimer(45)">45s</button>
  <button class="timer-btn secondary" onclick="setTimer(60)">60s</button>
  <button class="timer-btn secondary" onclick="setTimer(75)">75s</button>
  <button class="timer-btn secondary" onclick="setTimer(90)">90s</button>
  <div class="timer-display" id="timerDisplay">--</div>
  <button class="timer-btn primary" id="timerStartBtn" onclick="toggleTimer()">▶</button>
</div>

<canvas class="confetti" id="confettiCanvas"></canvas>

<script>
const WORKOUTS = [
  {
    name: "Push A", type: "push", day: 1,
    exercises: [
      { name: "Supino máquina plano", group: "Peito", focus: "Peitoral médio, deltoide anterior e tríceps", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Escápulas retraídas no apoio; empurre até estender sem travar cotovelos; desça controlado até sentir alongamento no peito.", icon: "🫁", gif: "https://static.exercisedb.dev/media/DOoWcnA.gif" },
      { name: "Supino máquina inclinado", group: "Peito", focus: "Peitoral superior e tríceps", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Banco ~30°; empurre na linha do queixo; desça até antebraços ficarem verticais.", icon: "🫁", gif: "https://static.exercisedb.dev/media/jHAnWmT.gif" },
      { name: "Tríceps máquina (extensora)", group: "Tríceps", focus: "Cabeça lateral e medial do tríceps", sets: 3, reps: "10-12 reps", rest: "75s", desc: "Cotovelos alinhados com o eixo; estenda até o fim; retorne devagar sem deixar o peso cair.", icon: "💪", gif: "https://static.exercisedb.dev/media/Ser9eQp.gif" },
      { name: "Tríceps pushdown (polia)", group: "Tríceps", focus: "Tríceps com ênfase no final da extensão", sets: 3, reps: "10-15 reps", rest: "60s", desc: "Barra reta ou V; cotovelos colados ao corpo; estenda até embaixo; volte só até 90°.", icon: "💪", gif: "https://static.exercisedb.dev/media/3ZflifB.gif" },
      { name: "Crunch máquina", group: "Abdômen", focus: "Reto abdominal", sets: 3, reps: "12-15 reps", rest: "45s", desc: "Segure as alças; feche costelas em direção ao quadril; retorne sem soltar a tensão.", icon: "🎯", gif: "https://static.exercisedb.dev/media/Wgaz7pm.gif" }
    ]
  },
  {
    name: "Pull A", type: "pull", day: 2,
    exercises: [
      { name: "Puxada frente supinada", group: "Costas", focus: "Latíssimo, redondo maior e bíceps", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Pegada supinada; peito alto; puxe cotovelos para o bolso; devolva esticando sem soltar escápulas.", icon: "🦅", gif: "https://static.exercisedb.dev/media/7F1DVzn.gif" },
      { name: "Rosca Scott máquina", group: "Bíceps", focus: "Bíceps braquial com menos roubo do ombro", sets: 3, reps: "8-12 reps", rest: "75s", desc: "Braços apoiados no pad; suba sem mover ombros; desça até quase estender sem hiperextender.", icon: "💪", gif: "https://static.exercisedb.dev/media/b6hQYMb.gif" },
      { name: "Rosca máquina pegada neutra", group: "Bíceps", focus: "Braquial e braquiorradial", sets: 3, reps: "10-12 reps", rest: "60s", desc: "Polegar pra cima; cotovelos fixos; suba controlado; desça em ~2s sem balançar.", icon: "💪", gif: "https://static.exercisedb.dev/media/OAguZoG.gif" },
      { name: "Face pull (polia, corda)", group: "Ombros", focus: "Deltoide posterior, trapézio médio e manguito", sets: 3, reps: "12-15 reps", rest: "60s", desc: "Polia na altura do rosto; puxe abrindo a corda para as têmporas; aperte 1s atrás.", icon: "🎯", gif: "https://static.exercisedb.dev/media/8DiFDVA.gif" },
      { name: "Prancha lateral", group: "Abdômen", focus: "Oblíquos e estabilidade lateral do core", sets: 3, reps: "30-45s", rest: "45s", desc: "Antebraço no chão, corpo em linha; quadril alto e alinhado; segure sem deixar cair.", icon: "🎯", gif: "https://static.exercisedb.dev/media/5VXmnV5.gif" }
    ]
  },
  {
    name: "Legs", type: "legs", day: 3,

      { name: "Hack squat · Quadríceps", group: "Pernas", focus: "Quadríceps com alta estabilidade", sets: 3, reps: "10-12 reps", rest: "90s", desc: "Costas no encosto; pés à frente; desça até 90°; suba sem tirar lombar do apoio.", icon: "🦵", gif: "https://static.exercisedb.dev/media/5VCj6iH.gif" },
      { name: "Elevação de joelhos", group: "Abdômen", focus: "Infra abdominal e flexão de quadril com controle", sets: 3, reps: "12-15 reps", rest: "45s", desc: "Braços apoiados; leve joelhos ao peito enrolando quadril; desça controlado sem balançar.", icon: "🎯", gif: "https://static.exercisedb.dev/media/03lzqwk.gif" },
      { name: "Pallof press (polia)", group: "Abdômen", focus: "Antirrotação e estabilidade profunda do core", sets: 3, reps: "10-12 por lado", rest: "45s", desc: "De lado para a polia; pressione mãos à frente sem girar o tronco; segure 1-2s.", icon: "🎯", gif: "https://static.exercisedb.dev/media/9pa4H5m.gif" }
    ]
  },
  {
    name: "Push B", type: "push", day: 4,
    exercises: [

      { name: "Desenvolvimento máquina", group: "Ombros", focus: "Deltoide anterior e medial", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Lombar apoiada; empurre acima da cabeça; desça até antebraço vertical sem forçar pescoço.", icon: "🎯", gif: "https://static.exercisedb.dev/media/67n3r98.gif" },
      { name: "Peck deck", group: "Peito", focus: "Peitoral com ênfase na contração final", sets: 3, reps: "10-15 reps", rest: "60s", desc: "Braços semi-estendidos nas almofadas; junte na frente apertando 1s; retorne controlado.", icon: "🫁", gif: "https://static.exercisedb.dev/media/v3xmPAR.gif" },
      { name: "Extensora tríceps (overhead máq.)", group: "Tríceps", focus: "Cabeça longa do tríceps", sets: 3, reps: "10-12 reps", rest: "75s", desc: "Costas apoiadas; cotovelos fixos pra cima; estenda até o topo; desça devagar.", icon: "💪", gif: "https://static.exercisedb.dev/media/2IxROQ1.gif" },
      { name: "Crunch máquina", group: "Abdômen", focus: "Reto abdominal", sets: 3, reps: "12-15 reps", rest: "45s", desc: "Feche costelas ao quadril; não puxe com braços; retorne sem perder tensão.", icon: "🎯", gif: "https://static.exercisedb.dev/media/Wgaz7pm.gif" }
    ]
  },
  {
    name: "Pull B", type: "pull", day: 5,
    exercises: [
      { name: "Puxada neutra máquina", group: "Costas", focus: "Latíssimo e estabilidade escapular", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Pegada neutra; peito alto; puxe até barra tocar peito; devolva controlado.", icon: "🦅", gif: "https://static.exercisedb.dev/media/4c9BhzB.gif" },
      { name: "Remada máquina (Hammer)", group: "Costas", focus: "Espessura de dorsal, romboides e trapézio médio", sets: 3, reps: "8-12 reps", rest: "90s", desc: "Peito no pad; puxe cotovelos para trás retraindo escápulas; aperte 1s.", icon: "🦅", gif: "https://static.exercisedb.dev/media/7I6LNUG.gif" },
      { name: "Rosca direta máquina", group: "Bíceps", focus: "Bíceps braquial", sets: 3, reps: "8-12 reps", rest: "75s", desc: "Cotovelos no pad; suba até contração máxima; desça em ~2s controlado.", icon: "💪", gif: "https://static.exercisedb.dev/media/q6y3OhV.gif" },
      { name: "Shrugs no Smith", group: "Trapézio", focus: "Trapézio superior", sets: 3, reps: "12-15 reps", rest: "60s", desc: "Braços estendidos; eleve ombros às orelhas; pause 1s; desça devagar sem girar.", icon: "🎯", gif: "https://static.exercisedb.dev/media/OUQ0ZyW.gif" },
      { name: "Crunch invertido (banco)", group: "Abdômen", focus: "Infra abdominal com retroversão pélvica", sets: 3, reps: "12-15 reps", rest: "45s", desc: "Segure banco atrás da cabeça; leve joelhos ao peito enrolando quadril; desça controlado.", icon: "🎯", gif: "https://static.exercisedb.dev/media/nCU1Ekp.gif" }
    ]
  }
];

const GROUP_COLORS = {
  "Peito": "var(--peito)", "Tríceps": "var(--triceps)", "Costas": "var(--costas)",
  "Bíceps": "var(--biceps)", "Pernas": "var(--pernas)", "Ombros": "var(--ombros)",
  "Abdômen": "var(--abdomen)", "Trapézio": "var(--trapezio)"
};

const ACCENT_MAP = { push: "var(--accent-push)", pull: "var(--accent-pull)", legs: "var(--accent-legs)" };

const MOTIVATIONAL = [
  "Descanse, recupere e volte mais forte amanhã. 💤",
  "Músculos crescem no descanso. Aproveite o dia off. 🧘",
  "Hidrate-se, alongue-se e prepare-se pra próxima semana. 💧"
];

let currentDay = null;
let timerInterval = null;
let timerSeconds = 0;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDayOfWeek() {
  return new Date().getDay(); // 0=dom, 1=seg...
}

function getWorkoutForToday() {
  const dow = getDayOfWeek();
  if (dow === 0 || dow === 6) return null;
  return WORKOUTS[dow - 1];
}

function getTotalSets(workout) {
  return workout.exercises.reduce((sum, ex) => sum + (ex.sets || 0), 0);
}

function getChecklist(dayIndex) {
  const key = `workout_${getTodayKey()}_day${dayIndex}`;
  const saved = localStorage.getItem(key);
  return saved ? JSON.parse(saved) : [];
}

function saveChecklist(dayIndex, checked) {
  const key = `workout_${getTodayKey()}_day${dayIndex}`;
  localStorage.setItem(key, JSON.stringify(checked));
}

function getStreak() {
  const streak = localStorage.getItem('workout_streak');
  return streak ? JSON.parse(streak) : { count: 0, lastDate: null };
}

function updateStreak() {
  const today = getTodayKey();
  let streak = getStreak();
  if (streak.lastDate === today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

  if (streak.lastDate === yesterdayKey) {
    streak.count++;
  } else if (streak.lastDate !== today) {
    streak.count = 1;
  }
  streak.lastDate = today;
  localStorage.setItem('workout_streak', JSON.stringify(streak));
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const days = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'];

  tabsEl.innerHTML = WORKOUTS.map((w, i) => {
    const active = i === currentDay ? 'active' : '';
    return `<button class="tab ${active}" type="button" data-type="${w.type}" onclick="switchDay(${i})">${days[i]}<br><small>${w.name}</small></button>`;
  }).join('') + `<button class="tab ${currentDay === null ? 'active' : ''}" type="button" data-type="rest" onclick="switchDay(-1)">🛋️<br><small>Rest</small></button>`;
}

function renderExercises(dayIndex) {
  const list = document.getElementById('exerciseList');
  const title = document.getElementById('title');
  const workoutLabel = document.getElementById('workoutLabel');
  const progressLabel = document.getElementById('progressLabel');
  const setsLabel = document.getElementById('setsLabel');
  const tipBox = document.getElementById('tipBox');

  if (dayIndex === -1 || dayIndex === null) {
    const msg = MOTIVATIONAL[Math.floor(Math.random() * MOTIVATIONAL.length)];
    list.innerHTML = `<div class="rest-day"><div class="emoji">😴</div><h2>Dia de Descanso</h2><p>${msg}</p></div>`;
    document.getElementById('progressBar').style.width = '0%';
    title.textContent = 'Workout Tracker';
    workoutLabel.textContent = 'Descanso';
    progressLabel.textContent = '0 de 0';
    setsLabel.textContent = '0';
    tipBox.textContent = 'Use o dia off para recuperar, alongar e manter hidratação e passos leves.';
    return;
  }

  const workout = WORKOUTS[dayIndex];
  const checked = getChecklist(dayIndex);
  const accent = ACCENT_MAP[workout.type];
  title.textContent = workout.name;
  workoutLabel.textContent = workout.name;
  progressLabel.textContent = `${checked.length} de ${workout.exercises.length}`;
  setsLabel.textContent = getTotalSets(workout);
  tipBox.textContent = 'Cada card mostra foco muscular, séries, reps e descanso. Abra "Ver execução e técnica" só quando precisar.';

  list.innerHTML = workout.exercises.map((ex, i) => {
    const isDone = checked.includes(i);
    const color = GROUP_COLORS[ex.group] || '#666';
    return `
      <button class="exercise-card ${isDone ? 'done' : ''}" id="card-${i}" type="button" onclick="toggleExercise(${dayIndex}, ${i}, event)">
        <div class="card-image">
          ${ex.gif ? `<img class="exercise-gif" src="${ex.gif}" alt="${ex.name}" loading="lazy" decoding="async" onload="this.parentElement.classList.add('has-gif')" onerror="this.remove()">` : ''}
          <div class="fallback-media">
            <div class="fallback-icon">${ex.icon}</div>
            <span class="fallback-label">${ex.group.slice(0, 3).toUpperCase()}</span>
          </div>
        </div>
        <div class="card-content">
          <span class="badge" style="background: ${color}20; color: ${color};">${ex.group}</span>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-focus">${ex.focus}</div>
          <div class="exercise-meta">
            <span class="meta-pill">${ex.sets} séries</span>
            <span class="meta-pill">${ex.reps}</span>
            <span class="meta-pill">Descanso ${ex.rest}</span>
          </div>
          <div class="exercise-reps">Marque quando terminar todas as séries previstas.</div>
          <div class="exercise-desc">
            <details>
              <summary><span class="desc-preview">Ver execução e técnica</span></summary>
              <span class="desc-full">${ex.desc}</span>
            </details>
          </div>
        </div>
        <div class="check-circle">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
      </button>`;
  }).join('');

  updateProgress(dayIndex);
  document.getElementById('progressBar').style.background = accent;
}

function toggleExercise(dayIndex, exIndex, event) {
  if (event && event.target.closest('details')) return;
  let checked = getChecklist(dayIndex);
  if (checked.includes(exIndex)) {
    checked = checked.filter(i => i !== exIndex);
  } else {
    checked.push(exIndex);
    const card = document.getElementById(`card-${exIndex}`);
    card.classList.add('just-checked');
    setTimeout(() => card.classList.remove('just-checked'), 300);
  }
  saveChecklist(dayIndex, checked);
  renderExercises(dayIndex);

  // Check if all done
  if (checked.length === WORKOUTS[dayIndex].exercises.length) {
    updateStreak();
    document.getElementById('streakCount').textContent = getStreak().count;
    launchConfetti();
  }
}

function updateProgress(dayIndex) {
  const checked = getChecklist(dayIndex);
  const total = WORKOUTS[dayIndex].exercises.length;
  const pct = (checked.length / total) * 100;
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${checked.length} de ${total}`;
}

function switchDay(dayIndex) {
  currentDay = dayIndex === -1 ? null : dayIndex;
  renderTabs();
  renderExercises(dayIndex);
}

// Timer
function setTimer(seconds) {
  timerSeconds = seconds;
  document.getElementById('timerDisplay').textContent = formatTime(seconds);
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timerStartBtn').textContent = '▶';
}

function toggleTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timerStartBtn').textContent = '▶';
  } else {
    if (timerSeconds <= 0) timerSeconds = 90;
    document.getElementById('timerStartBtn').textContent = '⏸';
    timerInterval = setInterval(() => {
      timerSeconds--;
      document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('timerDisplay').textContent = '✅';
        document.getElementById('timerStartBtn').textContent = '▶';
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    }, 1000);
  }
}

function formatTime(s) {
  const min = Math.floor(s / 60);
  const sec = s % 60;
  return min > 0 ? `${min}:${String(sec).padStart(2,'0')}` : `${sec}s`;
}

// Confetti
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    size: Math.random() * 8 + 4,
    speedY: Math.random() * 3 + 2,
    speedX: (Math.random() - 0.5) * 4,
    color: ['#f97316','#3b82f6','#22c55e','#eab308','#a855f7','#ef4444'][Math.floor(Math.random()*6)],
    rotation: Math.random() * 360
  }));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rotation += 3;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
      ctx.restore();
    });
    frame++;
    if (frame < 120) requestAnimationFrame(animate);
    else { canvas.style.display = 'none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  animate();
}

// Init
function init() {
  const now = new Date();
  const options = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('pt-BR', options);
  document.getElementById('streakCount').textContent = getStreak().count;

  const todayWorkout = getWorkoutForToday();
  if (todayWorkout) {
    currentDay = todayWorkout.day - 1;
    document.getElementById('title').textContent = todayWorkout.name;
  } else {
    currentDay = null;
  }

  renderTabs();
  renderExercises(currentDay === null ? -1 : currentDay);
}

init();
</script>
